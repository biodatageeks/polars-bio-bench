common:
  baseline: polars_bio
  polars_bio_output_type: polars.LazyFrame
  polars_bio_coordinate_system: 0-based
  polars_bio_consume_mode: count
benchmarks:
  - name: overlap-parallel-polars-bio-all-inputs
    operation: overlap
    dataset: databio
    tools:
      - polars_bio
    parallel: true
    clear_input_caches_between_variants: true
    threads:
      - 1
      - 2
      - 4
      - 8
    input_dataframes: true
    dataframes_io:
      - "pandas.DataFrame:pandas.DataFrame"
      - "polars.DataFrame:polars.DataFrame"
      - "polars.LazyFrame:polars.LazyFrame"
      - "pandas.pyarrow.DataFrame:pandas.DataFrame"
    num_repeats: 3
    num_executions: 1
    test-cases:
      - "1-2"
      - "2-1"
      - "3-7"
      - "7-3"
      - "7-8"
      - "8-7"

