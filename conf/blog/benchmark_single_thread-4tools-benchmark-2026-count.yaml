common:
  baseline: polars_bio
  polars_bio_output_type: polars.LazyFrame
  polars_bio_coordinate_system: 0-based
  polars_bio_consume_mode: count
benchmarks:
  - name: overlap-single-3tools
    operation: overlap
    dataset: databio
    tools:
      - polars_bio
      - pyranges1
#      - genomicranges
      - bioframe
    parallel: false
    input_dataframes: false
    num_repeats: 3
    num_executions: 1
    test-cases:
      - "1-2"
      - "2-1"
      - "3-7"
      - "7-3"
      - "7-8"
      - "8-7"

